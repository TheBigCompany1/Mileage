<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mileage</title>

    <!-- PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mileage">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="manifest" href="manifest.json">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-elements">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>
    <div class="app-container">
        <header style="display: flex; justify-content: space-between; align-items: center; text-align: left;">
            <div>
                <h1>Mileage Tracker</h1>
                <p class="subtitle">Keep your lease on track</p>
            </div>
            <button id="edit-profile-btn" class="icon-btn" aria-label="Edit Profile" style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <main id="setup-view" class="hidden">
            <section class="card frosted-glass input-section fade-in">
                <h2>Car Profile Setup</h2>
                <div class="form-group">
                    <label for="lease-start">Lease Start Date</label>
                    <input type="date" id="lease-start" class="form-input" />
                </div>
                <div class="form-group">
                    <label for="yearly-mileage">Yearly Mileage</label>
                    <input type="number" id="yearly-mileage" class="form-input" placeholder="10000" />
                </div>
                <div class="form-group">
                    <label for="lease-years">Lease Duration (Years)</label>
                    <input type="number" id="lease-years" class="form-input" placeholder="3" />
                </div>
                <button id="save-profile-btn" class="primary-btn">Save Profile</button>
            </section>
        </main>

        <main id="dashboard-view" class="hidden">
            <section class="card frosted-glass input-section fade-in" style="animation-delay: 0.1s;">
                <label for="odometer">Current Odometer</label>
                <div class="input-wrapper">
                    <input type="number" id="odometer" inputmode="numeric" pattern="[0-9]*" placeholder="0" />
                    <span class="unit">mi</span>
                </div>
            </section>

            <section class="card frosted-glass status-section fade-in" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <h2>Current Status</h2>
                    <div class="status-indicator" id="status-dot"></div>
                </div>
                <div id="status-text" class="status">0 miles UNDER</div>
                <div class="detail-row">
                    <span>Target exactly to date</span>
                    <span id="target-text" class="detail-value">0</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </section>

            <section class="card frosted-glass remaining-section fade-in" style="animation-delay: 0.3s;">
                <h2>Miles Remaining</h2>
                <div id="remaining-text" class="huge-number">30,000</div>
                <div class="detail-row">
                    <span>Total Lease Allowance</span>
                    <span id="total-allowance-text" class="detail-value">30,000</span>
                </div>
            </section>

            <section class="card frosted-glass pace-section fade-in" style="animation-delay: 0.4s;">
                <div class="card-header">
                    <h2>Pace Breakdown</h2>
                </div>
                <div class="detail-row" style="padding-top: 0; border-top: none;">
                    <span>Days Since Start</span>
                    <span id="days-elapsed-text" class="detail-value">--</span>
                </div>
                <div class="detail-row">
                    <span>Allowed Daily Average</span>
                    <span id="allowed-daily-text" class="detail-value">--</span>
                </div>
                <div class="detail-row">
                    <span>Pace Target</span>
                    <span id="pace-target-text" class="detail-value">--</span>
                </div>
                <div class="detail-row">
                    <span>Pace Difference</span>
                    <span id="pace-diff-text" class="detail-value" style="font-weight: 700;">--</span>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
